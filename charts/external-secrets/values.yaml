global:
  defaultNamespace: external-secrets
namespaces: []
productionChecks:
  enabled: false
external-secrets:
  installCRDs: true
  createOperator: true
  rbac:
    create: true
  serviceAccount:
    create: true
    name: ''
  webhook:
    create: true
  certController:
    create: true
  serviceMonitor:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
vaultStore:
  enabled: false
  kind: ClusterSecretStore
  name: hcp-vault
  namespace: ''
  provider:
    server: https://vault.example.com
    path: secret
    version: v2
    namespace: ''
    caBundle: ''
  auth:
    kubernetes:
      mountPath: kubernetes
      role: external-secrets
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
vaultStoreApps:
  enabled: false
  kind: ClusterSecretStore
  name: hcp-vault-apps
  namespace: ''
  provider:
    server: https://vault.example.com
    path: secret
    version: v2
    namespace: ''
    caBundle: ''
  auth:
    kubernetes:
      mountPath: kubernetes
      role: external-secrets
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets

# externalSecret: {} # legacy single-item field, kept for backward compatibility
# externalSecrets is a list of ExternalSecret resources to create
externalSecrets: []
